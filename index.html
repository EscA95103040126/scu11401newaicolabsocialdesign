<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國生活導覽 - 絲滑入口</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background: #fafafa;
            color: #222;
            line-height: 1.6;
            overflow-x: hidden;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            html {
                scroll-behavior: auto;
            }
        }

        .hero {
            text-align: center;
            padding: 6rem 2rem 3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #666;
            font-weight: 400;
        }

        .subtitle span {
            color: #0066cc;
            font-weight: 600;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.4s ease-out;
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, opacity;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            transition: transform 0.4s ease-out;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #222;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }

        .icon-map { color: #03C75A; }
        .icon-tech { color: #FF6B00; }
        .icon-fashion { color: #000; }
        .icon-shop { color: #FA4C4C; }
        .icon-food { color: #2AC1BC; }
        .icon-hotel { color: #FF2D55; }
        .icon-transport { color: #FEE500; }
        .icon-qa { color: #03C75A; }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: #999;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            margin-top: 4rem;
        }

        footer a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #0055aa;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>韓國生活導覽</h1>
        <p class="subtitle">為中文使用者打造的<span>絲滑入口</span></p>
    </div>

    <div class="container">
        <div class="grid">
            <a href="https://map.naver.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-map">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <h2 class="card-title">地圖導航</h2>
                <p class="card-desc">Naver Map - 韓國最精準的地圖服務</p>
            </a>

            <a href="https://danawa.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-tech">
                    <i class="fas fa-laptop"></i>
                </div>
                <h2 class="card-title">3C 比價</h2>
                <p class="card-desc">Danawa - 電子產品價格比較平台</p>
            </a>

            <a href="https://www.musinsa.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-fashion">
                    <i class="fas fa-tshirt"></i>
                </div>
                <h2 class="card-title">韓國服飾</h2>
                <p class="card-desc">Musinsa - 韓國最大時尚購物平台</p>
            </a>

            <a href="https://www.coupang.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-shop">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <h2 class="card-title">韓國購物</h2>
                <p class="card-desc">Coupang - 韓國電商龍頭</p>
            </a>

            <a href="https://www.baemin.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-food">
                    <i class="fas fa-utensils"></i>
                </div>
                <h2 class="card-title">美食外送</h2>
                <p class="card-desc">Baemin - 韓國最受歡迎外送平台</p>
            </a>

            <a href="https://www.yanolja.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-hotel">
                    <i class="fas fa-bed"></i>
                </div>
                <h2 class="card-title">住宿預訂</h2>
                <p class="card-desc">Yanolja - 韓國旅遊住宿首選</p>
            </a>

            <a href="https://www.kakaocorp.com/page/service/service/KakaoT" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-transport">
                    <i class="fas fa-taxi"></i>
                </div>
                <h2 class="card-title">韓國交通</h2>
                <p class="card-desc">Kakao T - 計程車與大眾運輸</p>
            </a>

            <a href="https://kin.naver.com/" target="_blank" rel="noopener noreferrer" class="card">
                <div class="card-icon icon-qa">
                    <i class="fas fa-question-circle"></i>
                </div>
                <h2 class="card-title">知識問答</h2>
                <p class="card-desc">Naver 知識iN - 韓國最大問答社群</p>
            </a>
        </div>
    </div>

    <footer>
        <p>僅提供連結,不負責外部內容 | AI 協作社會設計專案</p>
    </footer>

    <script>
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 100);
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => observer.observe(card));
        });
    </script>
</body>
</html>
